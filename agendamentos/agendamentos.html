<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Agendamentos</title>

    <link rel="stylesheet" href="../assets/css/agendamentos.css" />

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Ícones -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <div id="header"></div>

    <div id="pageType" data-type="agendamentos"></div>

    <main class="container-agendamentos">
      <!-- PRÓXIMOS HORÁRIOS -->
      <section class="card horarios-card">
        <div class="card-title">
          <h2>PRÓXIMOS HORÁRIOS</h2>

          <div class="date-navigation">
            <button>
              <i class="fa-solid fa-circle-arrow-left"></i>
            </button>

            <span id="currentDate"></span>

            <button>
              <i class="fa-solid fa-circle-arrow-right"></i>
            </button>
          </div>
        </div>

        <!-- LISTA DINÂMICA -->
        <div class="horarios-list" id="horariosList"></div>

        <div class="scroll-buttons">
          <button>
            <i class="fa-solid fa-circle-arrow-up"></i>
          </button>

          <button>
            <i class="fa-solid fa-circle-arrow-down"></i>
          </button>
        </div>
      </section>

      <!-- CENTRO -->
      <section class="middle-section">
        <div class="card agenda-card">
          <h1>Agenda<br />Completa</h1>
        </div>

        <div class="card options-card">
          <h2>OUTRAS OPÇÕES</h2>

          <div class="options-buttons">
            <button class="option-btn">
              REALIZAR<br />
              AGENDAMENTO
            </button>

            <button class="option-btn">
              ATUALIZAR<br />
              RETIRADA
            </button>
          </div>
        </div>
      </section>

      <!-- RETIRADA -->
      <section class="card retirada-card">
        <h2>AGUARDANDO RETIRADA</h2>

        <div class="pets-grid" id="retiradaList"></div>
      </section>
    </main>

    <script src="/assets/js/header.js"></script>
    <script src="/assets/js/agendamentos.js"></script>
  </body>
</html>
